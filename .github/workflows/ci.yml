name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Worker name comes from wrangler.jsonc ("beacon-qr").
# Required secrets (repo): CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID.
# Repo variables: NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SITE_URL — both are
# inlined at build time (SITE_URL is baked into printed QR images).
# Runtime secrets (SUPABASE_SECRET_KEY, ADMIN_*, PROGRAM_PASSCODE) live on the
# worker itself: `bunx wrangler secret put <NAME>`.
env:
  NEXT_TELEMETRY_DISABLED: 1
  NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL || '' }}
  NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || '' }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      - run: bun run lint
      # Builds the Next app AND bundles the OpenNext worker — fails if either breaks.
      - run: bun run build:worker

  deploy:
    name: Deploy to Cloudflare Workers
    needs: [ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      - name: Build worker
        run: bun run build:worker

      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler deploy

  deploy-preview:
    name: Deploy Preview
    needs: [ci]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      - name: Build worker
        run: bun run build:worker

      - name: Upload preview version
        id: preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          out=$(bunx wrangler versions upload 2>&1)
          echo "$out"
          url=$(echo "$out" | grep -oE 'https://[a-z0-9.-]+\.workers\.dev' | head -1)
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL
        if: steps.preview.outputs.url != ''
        uses: actions/github-script@v8
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Preview deployed to: ${{ steps.preview.outputs.url }}`
            })
